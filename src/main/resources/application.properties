spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
server.port=${PORT:8080}
github.api.token=${GITHUB_TOKEN}
github.api.base-url=https://api.github.com
leetcode.api.base-url=https://leetcode-stats-api.herokuapp.com
scheduler.cron=0 0 1 * * ?
spring.main.allow-circular-references=true